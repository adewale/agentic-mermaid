<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 994.975 209.186" width="994.975" height="209.186" style="--font:Inter" role="img" aria-labelledby="edit-loop-svg-title edit-loop-svg-desc">
<title id="edit-loop-svg-title">Agentic Mermaid edit loop</title>
<desc id="edit-loop-svg-desc">Source flows through parse, narrow, mutate, verify, and serialize to render, with warnings routed back for another edit.</desc>
<style>
  text { font-family: var(--font, 'Inter'), system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 78%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 66%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 54%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="S" data-to="P" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-marker-end="arrow" points="156.791,83.86800000000001 204.791,83.86800000000001" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="P" data-to="N" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-marker-end="arrow" points="282.30899999999997,90.018 330.30899999999997,90.018" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="N" data-to="M" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-marker-end="arrow" points="415.23699999999997,90.018 463.23699999999997,90.018" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="M" data-to="V" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-marker-end="arrow" points="542.237,90.018 590.237,90.018" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="V" data-to="R" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-marker-end="arrow" data-label="ok" points="690.2729999999999,90.018 807.803,90.018" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="V" data-to="N" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-marker-end="arrow" data-label="warnings" points="640.255,140.036 640.255,150.036 372.77299999999997,150.036 372.77299999999997,108.468" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="V" data-to="R" data-label="ok">
  <rect class="edge-label-halo" x="730.273" y="70.868" width="37.53" height="38.3" rx="4" ry="4" fill="var(--bg)" stroke="none" />
  <rect x="734.273" y="74.868" width="29.53" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="749.038" y="90.018" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">ok</text>
</g>
<g class="edge-label" data-from="V" data-to="N" data-label="warnings">
  <rect class="edge-label-halo" x="480.631" y="130.036" width="69.606" height="38.3" rx="4" ry="4" fill="var(--bg)" stroke="none" />
  <rect x="484.631" y="134.036" width="61.606" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="515.434" y="149.186" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">warnings</text>
</g>
<g class="node" data-id="S" data-label="Source .mmd" data-shape="rectangle">
  <rect x="40" y="65.418" width="116.79099999999998" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="98.3955" y="83.86800000000001" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Source .mmd</text>
</g>
<g class="node" data-id="P" data-label="parse" data-shape="rectangle">
  <rect x="204.791" y="65.418" width="77.518" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="243.55" y="83.86800000000001" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">parse</text>
</g>
<g class="node" data-id="N" data-label="narrow" data-shape="rectangle">
  <rect x="330.30899999999997" y="71.568" width="84.928" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="372.77299999999997" y="90.018" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">narrow</text>
</g>
<g class="node" data-id="M" data-label="mutate" data-shape="rectangle">
  <rect x="463.23699999999997" y="71.568" width="79" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="502.73699999999997" y="90.018" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">mutate</text>
</g>
<g class="node" data-id="V" data-label="verify" data-shape="diamond">
  <polygon points="640.255,40 690.273,90.018 640.255,140.036 590.237,90.018" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="640.255" y="90.018" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">verify</text>
</g>
<g class="node" data-id="R" data-label="serialize → render" data-shape="rectangle">
  <rect x="807.803" y="71.568" width="147.17200000000003" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="881.389" y="90.018" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">serialize → render</text>
</g>
</svg>