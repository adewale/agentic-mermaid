<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 368.79 276" width="368.79" height="276" style="--bg:#FFFFFF;--fg:#27272A;--font:Inter;background:#FFFFFF" role="img" aria-roledescription="pie chart">
<style>
  text { font-family: var(--font, 'Inter'), system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          #27272A;
    --_text-sec:      #575759;
    --_text-muted:    #707072;
    --_text-faint:    #8a8a8c;
    --_line:          #939395;
    --_arrow:         #47474a;
    --_node-fill:     #f9f9f9;
    --_node-stroke:   #d4d4d4;
    --_group-fill:    #FFFFFF;
    --_group-hdr:     #f4f4f4;
    --_inner-stroke:  #e5e5e5;
    --_key-badge:     #e9e9ea;
  }
</style>
<style>
  .pie-slice { stroke: #FFFFFF; stroke-width: 1.5; }
  .pie-slice.highlighted { stroke: #27272A; stroke-width: 2.5; opacity: 1; }
  .pie-slice.highlighted-on-hover:hover { stroke: #27272A; stroke-width: 2.5; opacity: 1; }
  .pie-legend-swatch { stroke: #d4d4d4; stroke-width: 1; }
  .pie-legend-text { fill: #27272A; }
  .pie-title { fill: #27272A; }
  .pie-slice.pie-dim { opacity: 0.4; }
  .pie-legend-swatch.pie-dim { opacity: 0.4; }
</style>
