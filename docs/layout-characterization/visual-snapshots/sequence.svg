  <line x1="210" y1="136" x2="350" y2="136" stroke="#939395" stroke-width="1" marker-end="url(#char-sequence-seq-arrow)" data-relationship="sequence-message" data-direction="forward" data-id="message:Bob-&gt;DB#0:line" data-role="message" />
  <text x="280" y="126" font-size="11" text-anchor="middle" font-weight="400" fill="#707072" dy="3.8499999999999996">Query</text>
