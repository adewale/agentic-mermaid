<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 286" width="420" height="286" style="--bg:#FFFFFF;--fg:#27272A;--font:Inter;background:#FFFFFF">
<style>
  text { font-family: var(--font, 'Inter'), system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          #27272A;
    --_text-sec:      #575759;
    --_text-muted:    #707072;
    --_text-faint:    #8a8a8c;
    --_line:          #939395;
    --_arrow:         #47474a;
    --_node-fill:     #f9f9f9;
    --_node-stroke:   #d4d4d4;
    --_group-fill:    #FFFFFF;
    --_group-hdr:     #f4f4f4;
    --_inner-stroke:  #e5e5e5;
    --_key-badge:     #e9e9ea;
  }
</style>
<defs>
  <marker id="char-sequence-seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="#47474a" />
  </marker>
  <marker id="char-sequence-seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="#47474a" stroke-width="1" />
  </marker>
  <marker id="char-sequence-seq-arrow-cross" markerWidth="8" markerHeight="5" refX="4" refY="2.5" orient="auto">
    <path d="M1 1 L7 4 M1 4 L7 1" fill="none" stroke="#47474a" stroke-width="1.5" />
  </marker>
  <marker id="char-sequence-seq-arrow-half-top" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <path d="M0 0 L8 2.5" fill="none" stroke="#47474a" stroke-width="1" />
  </marker>
  <marker id="char-sequence-seq-arrow-half-bottom" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <path d="M0 5 L8 2.5" fill="none" stroke="#47474a" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="Alice" x1="70" y1="70" x2="70" y2="256" stroke="#939395" stroke-width="0.75" stroke-dasharray="6 4" data-relationship="lifeline" data-direction="undirected" />
<line class="lifeline" data-actor="Bob" x1="210" y1="70" x2="210" y2="256" stroke="#939395" stroke-width="0.75" stroke-dasharray="6 4" data-relationship="lifeline" data-direction="undirected" />
<line class="lifeline" data-actor="DB" x1="350" y1="70" x2="350" y2="256" stroke="#939395" stroke-width="0.75" stroke-dasharray="6 4" data-relationship="lifeline" data-direction="undirected" />
<g class="message" data-from="Alice" data-to="Bob" data-label="Request" data-line-style="solid" data-start-head="none" data-end-head="filled" data-central-start="false" data-central-end="false" data-self="false" data-id="message:Alice-&gt;Bob#0" data-role="message" role="graphics-symbol" aria-roledescription="relation" aria-label="Alice to Bob: Request">
  <line x1="70" y1="96" x2="210" y2="96" stroke="#939395" stroke-width="1" marker-end="url(#char-sequence-seq-arrow)" data-relationship="sequence-message" data-direction="forward" data-id="message:Alice-&gt;Bob#0:line" data-role="message" />
  <text x="140" y="86" font-size="11" text-anchor="middle" font-weight="400" fill="#707072" dy="3.8499999999999996">Request</text>
</g>
