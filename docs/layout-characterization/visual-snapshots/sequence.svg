  <line x1="210" y1="216" x2="70" y2="216" stroke="#939395" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#char-sequence-seq-arrow)" data-relationship="sequence-message" data-direction="forward" data-id="message:Bob-&gt;Alice#0:line" data-role="message" />
  <text x="140" y="206" font-size="11" text-anchor="middle" font-weight="400" fill="#707072" dy="3.8499999999999996">Response</text>
