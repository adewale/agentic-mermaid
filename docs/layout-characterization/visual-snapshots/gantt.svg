<style>
  text { font-family: var(--font, 'Inter'), system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          #27272A;
    --_text-sec:      #575759;
    --_text-muted:    #707072;
    --_text-faint:    #8a8a8c;
    --_line:          #939395;
    --_arrow:         #47474a;
    --_node-fill:     #f9f9f9;
    --_node-stroke:   #d4d4d4;
    --_group-fill:    #FFFFFF;
    --_group-hdr:     #f4f4f4;
    --_inner-stroke:  #e5e5e5;
