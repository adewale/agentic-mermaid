<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mark — minimal progression</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { margin: 0; font-family: var(--sans); }
  .stage { display: flex; gap: 40px; padding: 40px 44px; align-items: flex-start; }
  .stage.dark  { background: #0F1512; }
  .stage.light { background: #FFFFFF; }
  .col { display: flex; flex-direction: column; gap: 18px; align-items: flex-start; width: 188px; }
  .lab  { font-family: var(--mono); font-size: 12px; line-height: 1.45; }
  .lab b { font-weight: 600; }
  .stage.dark  .lab { color: #8FA199; }
  .stage.light .lab { color: #5A6661; }
  .stage.dark  .lab b { color: #D6DEDA; }
  .stage.light .lab b { color: #1C2622; }

  /* chip surfaces. --m-mid/--m-deep mirror the shader gradient; flat is the mid. */
  .chip { display: inline-grid; place-items: center; color: #0A4434; }
  .grad { background: linear-gradient(180deg, #79C9AB, #5CB897); }
  .flat { background: #6FC2A2; }
  .ring   { box-shadow: 0 0 0 1px rgba(0,0,0,0.16); }
  .lift   { box-shadow: 0 1px 2px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.10); }
  .gshadow svg { filter: drop-shadow(0 0.5px 0.5px rgba(0,0,0,0.18)); }
  .big { width: 84px; height: 84px; border-radius: 20px; }
  .big svg { width: 74px; height: 74px; display: block; }
  .sm  { width: 24px; height: 24px; border-radius: 6px; }
  .sm svg  { width: 21px; height: 21px; display: block; }
  .row { display: inline-flex; align-items: center; gap: 10px; font-family: var(--serif); font-size: 18px; }
  .stage.dark  .row { color: #E7ECE9; }
  .stage.light .row { color: #18211E; }
</style>
</head>
<body>
  <div class="stage dark"  id="dark"></div>
  <div class="stage light" id="light"></div>
<script>
const NS = 'http://www.w3.org/2000/svg';
const N = { L:[14,7], M:[24,4], R:[34,7], Vl:[14,22], Vm:[24,22], Vr:[34,22], H:[24,38] };
function glyph(o) {
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('viewBox', '0 0 48 48'); svg.setAttribute('fill', 'none');
  const edge = (a, b, c, w) => { const p = document.createElementNS(NS, 'polyline'); p.setAttribute('points', `${N[a]} ${N[b]} ${N[c]}`); p.setAttribute('stroke', 'currentColor'); p.setAttribute('stroke-width', w); p.setAttribute('stroke-linecap', 'round'); p.setAttribute('stroke-linejoin', 'round'); svg.appendChild(p); };
  edge('L','Vl','H', o.eL); edge('M','Vm','H', o.eM); edge('R','Vr','H', o.eR);
  const dot = (k, r) => { const c = document.createElementNS(NS, 'circle'); c.setAttribute('cx', N[k][0]); c.setAttribute('cy', N[k][1]); c.setAttribute('r', r); c.setAttribute('fill', 'currentColor'); svg.appendChild(c); };
  dot('L', o.src); dot('M', o.src); dot('R', o.src); dot('H', o.sink);
  if (o.dummies) for (const k of ['Vl','Vm','Vr']) { const c = document.createElementNS(NS, 'circle'); c.setAttribute('cx', N[k][0]); c.setAttribute('cy', N[k][1]); c.setAttribute('r', 1.7); c.setAttribute('stroke', 'currentColor'); c.setAttribute('stroke-width', 1.3); svg.appendChild(c); }
  return svg;
}
const VARIANTS = [
  { name: 'Current', note: 'dummies · graded strokes · big sink · gradient+ring', surf: 'grad ring gshadow', g: { eL:1.9, eM:2.4, eR:1.9, src:2.5, sink:3.3, dummies:true } },
  { name: 'Tidy',    note: 'drop dummies · one stroke weight · keep sink · living chip', surf: 'grad lift gshadow', g: { eL:2.0, eM:2.0, eR:2.0, src:2.5, sink:3.3, dummies:false } },
  { name: 'Quiet',   note: 'flat chip · no shadow/ring · keep sink', surf: 'flat', g: { eL:1.9, eM:1.9, eR:1.9, src:2.4, sink:3.1, dummies:false } },
  { name: 'Hairline',note: 'thin uniform strokes · uniform nodes · flat', surf: 'flat', g: { eL:1.5, eM:1.5, eR:1.5, src:2.1, sink:2.1, dummies:false } },
];
for (const stageId of ['dark', 'light']) {
  const stage = document.getElementById(stageId);
  for (const v of VARIANTS) {
    const col = document.createElement('div'); col.className = 'col';
    const lab = document.createElement('div'); lab.className = 'lab';
    lab.innerHTML = `<b>${v.name}</b><br>${v.note}`;
    const big = document.createElement('span'); big.className = `chip big ${v.surf}`; big.appendChild(glyph(v.g));
    const row = document.createElement('div'); row.className = 'row';
    const sm = document.createElement('span'); sm.className = `chip sm ${v.surf}`; sm.appendChild(glyph(v.g));
    row.appendChild(sm); row.appendChild(document.createTextNode('Agentic Mermaid'));
    col.append(lab, big, row); stage.appendChild(col);
  }
}
</script>
</body>
</html>
