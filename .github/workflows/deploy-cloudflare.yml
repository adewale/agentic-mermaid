name: Deploy website to Cloudflare

# The canonical live site is agentic-mermaid.dev — a Cloudflare Workers Static
# Assets deployment (website/build.ts -> website/public) that also serves the
# hosted MCP endpoint at /mcp. This workflow rebuilds the bundle and deploys it
# with wrangler.
#
# Gated on a successful CI run for the same commit on main, so a red commit
# never reaches the live site. Also runnable manually via workflow_dispatch.
#
# Requires two repository secrets to publish from GitHub: CLOUDFLARE_API_TOKEN
# (a token with the Workers Scripts:Edit permission) and CLOUDFLARE_ACCOUNT_ID.
# If either secret is absent, the workflow exits green with a warning instead of
# making the repository's build status red; publish manually with Wrangler or add
# the secrets to re-enable automatic deploys.
#
# Note: /mcp is public, unauthenticated compute. Keep the DEC-2 WAF rate-limit
# rule and DEC-3 worker_loaders binding (see TODO.md) provisioned before
# announcing the endpoint — deploying does not set those up.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    # Deploy on a manual dispatch, or when CI succeeded on main.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WRANGLER_SEND_METRICS: 'false'
    steps:
      - name: Check Cloudflare deployment secrets
        id: cloudflare-secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Cloudflare deploy because CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID is not configured."
            {
              echo "### Cloudflare deploy skipped"
              echo ""
              echo 'GitHub Actions is missing `CLOUDFLARE_API_TOKEN` and/or `CLOUDFLARE_ACCOUNT_ID`.'
              echo 'Add those repository secrets to publish automatically, or deploy manually from the repository root with `SITE_GIT_SHA="$(git rev-parse HEAD)" SITE_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" bun run website && cd website && WRANGLER_SEND_METRICS=false npx --yes wrangler@latest deploy`.'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.cloudflare-secrets.outputs.available == 'true'
        with:
          # For a workflow_run trigger, build the exact commit CI validated.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - name: Setup Bun
        if: steps.cloudflare-secrets.outputs.available == 'true'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        if: steps.cloudflare-secrets.outputs.available == 'true'
        run: bun install
      - name: Build the site bundle
        if: steps.cloudflare-secrets.outputs.available == 'true'
        # Stamp public machine catalogs with both the exact CI-validated commit
        # and this deployment bundle's build time. The deploy build is not the
        # committed deterministic website:check artifact.
        run: SITE_GIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}" SITE_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" bun run website
      - name: Deploy to Cloudflare Workers
        if: steps.cloudflare-secrets.outputs.available == 'true'
        run: cd website && npx --yes wrangler@latest deploy
      - name: Smoke-test the live /mcp endpoint
        if: steps.cloudflare-secrets.outputs.available == 'true'
        # Post-deploy verification against the live endpoint. Two probes:
        #   1. `verify` on a 2-node flowchart — proves the Worker + MCP core
        #      answer at all.
        #   2. `execute` returning 42 — proves the LOADER (worker_loaders)
        #      binding is provisioned. A deploy can succeed with the binding
        #      declared but unprovisioned, and `execute` is the only tool that
        #      touches it (see website/README.md promotion checklist), so the
        #      pure-tool probe alone would pass while hosted Code Mode is dead.
        # Deploy propagation can lag, so each probe retries with backoff.
        # Assertions are on success values only — execute's error shape is not
        # part of this contract. The full-surface probe stays in
        # website/e2e-mcp.sh (no retries; asserts error shapes), run manually.
        run: |
          MCP='https://agentic-mermaid.dev/mcp'
          probe() { # label payload expected-substring
            local attempt
            for attempt in 1 2 3 4 5; do
              local got
              got="$(curl -sS --max-time 30 -X POST "$MCP" -H 'content-type: application/json' -d "$2" || true)"
              if [[ "$got" == *"$3"* ]]; then
                echo "ok   $1"
                return 0
              fi
              echo "retry $attempt/5 $1 (got: ${got:0:200})"
              sleep $((attempt * 15))
            done
            echo "::error title=Live /mcp smoke test failed::$1 never returned the expected substring $3 — see website/README.md promotion checklist."
            return 1
          }
          probe 'verify accepts a 2-node flowchart' \
            '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"verify","arguments":{"source":"flowchart TD\n  A --> B"}}}' \
            '\"ok\":true'
          probe 'execute runs in a dynamic-worker isolate (LOADER provisioned)' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"execute","arguments":{"code":"1 + 41"}}}' \
            '\"value\":42'
