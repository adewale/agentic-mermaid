name: Nightly route mutation

on:
  schedule:
    # Broad Stryker route lanes are intentionally off the PR gate; run them
    # nightly so mutation survivors are visible without blocking normal CI.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  route-mutation:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: routes
            command: bun run mutation-test:routes
            timeout: 90
          - name: route-certificates
            command: bun run mutation-test:routes:certs
            timeout: 45
          - name: subgraph-routing
            command: bun run mutation-test:routes:subgraph
            timeout: 60
          - name: sabotage-routes
            command: bun run sabotage:routes
            timeout: 30
          # Every registered family has a scheduled mutation lane. Flowchart
          # is covered by routes; XYChart + Architecture plus Mindmap/GitGraph
          # parser/layout/render cores are covered by families. The two focused
          # lanes below mutate their typed editing/replay bodies.
          - name: state
            command: bun run mutation-test:state
            timeout: 90
          - name: sequence
            command: bun run mutation-test:sequence
            timeout: 90
          - name: timeline
            command: bun run mutation-test:timeline
            timeout: 90
          - name: class
            command: bun run mutation-test:class
            timeout: 90
          - name: er
            command: bun run mutation-test:er
            timeout: 90
          - name: journey
            command: bun run mutation-test:journey
            timeout: 90
          - name: pie
            command: bun run mutation-test:pie
            timeout: 90
          - name: quadrant
            command: bun run mutation-test:quadrant
            timeout: 90
          - name: gantt
            command: bun run mutation-test:gantt
            timeout: 120
          - name: mindmap
            command: bun run mutation-test:mindmap
            timeout: 90
          - name: gitgraph
            command: bun run mutation-test:gitgraph
            timeout: 90
          - name: families
            command: bun run mutation-test:families
            timeout: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-mutation-${{ matrix.name }}
          path: |
            reports/mutation/**
            .stryker-tmp*/reports/**
          if-no-files-found: ignore
