name: Nightly mutation

on:
  schedule:
    # Broad Stryker lanes are intentionally off the PR gate. The plan shards
    # large configs, then the final job recombines their scores against each
    # config's single aggregate regression floor.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    name: Plan complete mutation coverage
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - id: matrix
        name: Derive source-relative shards
        run: bun run scripts/quality/nightly-mutation.ts matrix >> "$GITHUB_OUTPUT"

  mutation:
    name: ${{ matrix.name }}
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.name }}
        # Each shard runs with break=0 so it can emit its report. The verify job
        # applies the config's aggregate floor only after every shard is joined.
        env:
          MUTATION_PLAN_ITEM: ${{ matrix.name }}
        run: bun run scripts/quality/nightly-mutation.ts run "$MUTATION_PLAN_ITEM"

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-mutation-${{ matrix.name }}
          path: reports/mutation/${{ matrix.name }}-mutation.json
          if-no-files-found: error
          overwrite: true

  sabotage-routes:
    name: sabotage-routes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prove focused route tests detect deliberate regressions
        run: bun run sabotage:routes

  verify:
    name: Verify aggregate mutation floors
    if: ${{ !cancelled() }}
    needs: [plan, mutation, sabotage-routes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download every mutation report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-mutation-*
          path: reports/nightly
          merge-multiple: true

      - name: Recombine shards and enforce regression floors
        run: bun run scripts/quality/nightly-mutation.ts verify reports/nightly
