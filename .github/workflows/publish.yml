name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the golden-drift gate can diff the release commit
          # (it degrades to HEAD-diff logic outside of `push` events).
          fetch-depth: 0

      - name: Setup Bun
        # Pinned to a commit SHA (not the mutable `v2` tag): this workflow mints
        # the OIDC publish token, so a retagged/compromised action must not be
        # able to ride along. SHA is oven-sh/setup-bun v2.2.0.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pin to the runtime ci.yml validates on (see ci.yml note re: `latest`).
          bun-version: 1.3.13
          no-cache: true

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v7
        with:
          # OIDC trusted publishing requires Node >= 22.14 and npm >= 11.5.1.
          # (Node 20 is also EOL as of 2026-04-30.)
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        # Node 22 bundles npm 10.9.x; trusted publishing needs npm >= 11.5.1.
        # Pin npm instead of using the moving `latest` tag: npm 12.0.0 shipped
        # without the `sigstore` module needed by libnpmpublish's provenance
        # path on GitHub-hosted runners. Install `sigstore` in a temp prefix,
        # then copy that node_modules tree into npm's own module tree so
        # libnpmpublish can resolve it from inside npm without asking npm to
        # install dependencies for npm itself.
        run: |
          npm install -g npm@11.18.0
          tmp_sigstore="$(mktemp -d)"
          npm install --prefix "$tmp_sigstore" sigstore@latest
          cp -R "$tmp_sigstore/node_modules/." "$(npm root -g)/npm/node_modules/"
          npm --version
          NPM_GLOBAL_ROOT="$(npm root -g)" node -e "const { createRequire } = require('module'); console.log(createRequire(process.env.NPM_GLOBAL_ROOT + '/npm/package.json').resolve('sigstore'))"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # --- Release gate: mirror ci.yml's deterministic `test` job so a tagged
      # release cannot publish a commit that would fail CI.
      # Runs before the test step, whose preload overwrites the committed worker
      # inputs this check pins.
      - name: Check the committed website worker inputs are current
        run: bun run website:check

      - name: Run tests
        # Use the same bounded covered suite as CI; a release must not have a
        # weaker timeout or omit the under-tested-code finder.
        run: bun run test

      - name: Type check
        run: bun run typecheck

      - name: Check README hero image is current with the renderer
        run: bun run hero:check

      - name: Golden snapshot drift gate
        run: bun run scripts/ci/golden-drift.ts

      - name: Incremental mutation lane (faithfulness counter)
        run: bun run mutation-test:incremental

      - name: Fuzz the shipped artifact (built bundle + packed tarball, under Node)
        # The strongest pre-publish signal: builds dist/, and packs+installs the
        # tarball, then drives the library + bins under plain Node. Validates the
        # exact files[]/exports/bin a release commit may have changed.
        run: cd e2e && bun test dist-artifact-fuzz.e2e.test.ts tarball-consumer-fuzz.e2e.test.ts --timeout 600000

      - name: Build distributable
        run: bun run build

      - name: Publish to npm (OIDC trusted publishing)
        # No NODE_AUTH_TOKEN: auth is via the OIDC id-token minted above, so the
        # trusted publisher must be configured on npmjs.com first (see
        # docs/contributing/releasing.md). Provenance is generated automatically
        # under trusted publishing — no `--provenance` flag needed.
        run: npm publish --access public

  publish-mcp:
    # Keep registry publication in a retryable job. If it fails after npm has
    # accepted an immutable version, rerunning this job must not publish npm again.
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install MCP Registry publisher
        # This binary shares the job's OIDC permission, so pin both the release
        # and checksum instead of executing the mutable latest download.
        env:
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          curl --fail --location --silent --show-error \
            --output mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz
          echo "$MCP_PUBLISHER_SHA256  mcp-publisher.tar.gz" | sha256sum --check --strict
          tar --extract --gzip --file mcp-publisher.tar.gz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
