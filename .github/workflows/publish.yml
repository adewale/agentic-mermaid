name: Publish to npm

on:
  release:
    types: [published]

# OIDC is intentionally absent at workflow scope. Only the two final registry
# jobs may mint tokens; validation and artifact construction stay unprivileged.
permissions:
  contents: read

jobs:
  release-gate:
    name: Attest release identity and canonical CI
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require successful canonical CI for the exact release commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs="$(gh api -X GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
            -f head_sha="$GITHUB_SHA" \
            -f branch=main \
            -f status=success \
            -f per_page=100)"
          successes="$(printf '%s' "$runs" | jq --arg sha "$GITHUB_SHA" \
            '[.workflow_runs[] | select(.head_sha == $sha and .conclusion == "success")] | length')"
          if [ "$successes" -lt 1 ]; then
            echo "No successful CI workflow run exists for release commit $GITHUB_SHA on main" >&2
            exit 1
          fi

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # Release identity proves tag ancestry against origin/main.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
          no-cache: true

      - name: Verify release tag, package versions, and checked-out commit agree
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: bun run scripts/ci/release-identity.ts

  platform-smoke:
    name: Release platform smoke (${{ matrix.os }})
    needs: release-gate
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
          no-cache: true
      - name: Install frozen dependencies
        run: bun install --frozen-lockfile
      - name: Build the distributable
        run: bun run build
      - name: Run registry-derived cross-platform rendering contracts
        run: bun test src/__tests__/render-conformance-plan.test.ts --timeout 120000

  package:
    name: Build and verify the exact npm tarball
    needs: [release-gate, platform-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
          no-cache: true

      - name: Setup Node.js for package construction
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install the pinned publishing npm
        # npm 11.18.0 bundles its complete Sigstore/provenance dependency tree;
        # no mutable release-time dependency installation is required.
        run: |
          npm install -g npm@11.18.0 --ignore-scripts
          test "$(npm --version)" = "11.18.0"
          NPM_GLOBAL_ROOT="$(npm root -g)" node -e "const { createRequire } = require('module'); console.log(createRequire(process.env.NPM_GLOBAL_ROOT + '/npm/package.json').resolve('sigstore'))"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build the exact publish tree
        run: bun run build

      - name: Pack and verify the exact publication artifact
        run: bun run scripts/ci/verify-publish-package.ts --pack-destination release-artifact

      - name: Upload the verified publication artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-package-${{ github.sha }}
          path: release-artifact/
          if-no-files-found: error
          # Preserve the exact verified input long enough to retry MCP Registry
          # publication without attempting the immutable npm version again.
          retention-days: 30
          compression-level: 0
          overwrite: true

  publish:
    name: Publish verified tarball to npm
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node.js for npm trusted publishing
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install the pinned publishing npm
        run: |
          npm install -g npm@11.18.0 --ignore-scripts
          test "$(npm --version)" = "11.18.0"

      - name: Download the verified publication artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-package-${{ github.sha }}
          path: release-artifact

      - name: Verify the transferred tarball digest
        run: |
          test "$(find release-artifact -mindepth 1 -maxdepth 1 -exec printf x \; | wc -c)" -eq 3
          for artifact_file in package.tgz package.sha256 package-manifest.json; do
            test -f "release-artifact/$artifact_file"
            test ! -L "release-artifact/$artifact_file"
          done
          test "$(jq -r '.schemaVersion' release-artifact/package-manifest.json)" = 1
          test "$(jq -r '.filename' release-artifact/package-manifest.json)" = package.tgz
          manifest_sha="$(jq -er '.sha256 | select(type == "string")' release-artifact/package-manifest.json)"
          test "${#manifest_sha}" -eq 64
          case "$manifest_sha" in *[!0-9a-f]*) exit 1;; esac
          printf '%s  package.tgz\n' "$manifest_sha" | cmp --silent - release-artifact/package.sha256
          actual_sha="$(sha256sum release-artifact/package.tgz | cut -d ' ' -f 1)"
          test "$actual_sha" = "$manifest_sha"
          manifest_integrity="$(jq -er '.integrity | select(type == "string")' release-artifact/package-manifest.json)"
          actual_integrity="$(node -e "const {createHash}=require('node:crypto'); const {readFileSync}=require('node:fs'); process.stdout.write('sha512-'+createHash('sha512').update(readFileSync('release-artifact/package.tgz')).digest('base64'))")"
          test "$actual_integrity" = "$manifest_integrity"

      - name: Publish or recover the exact npm tarball (OIDC trusted publishing)
        # Publish the exact tarball inspected in the unprivileged package job.
        # No checkout, repository script, lifecycle hook, or mutable directory
        # runs after OIDC becomes available. A retry after an ambiguous remote
        # success accepts only the byte-identical immutable registry version.
        env:
          TARBALL: release-artifact/package.tgz
        run: |
          package_json="$(tar --extract --gzip --file "$TARBALL" --to-stdout package/package.json)"
          package_name="$(printf '%s' "$package_json" | jq -er '.name | select(. == "agentic-mermaid")')"
          package_version="$(printf '%s' "$package_json" | jq -er '.version | select(type == "string" and length > 0)')"
          local_integrity="$(node -e "const {createHash}=require('node:crypto'); const {readFileSync}=require('node:fs'); process.stdout.write('sha512-'+createHash('sha512').update(readFileSync(process.env.TARBALL)).digest('base64'))")"

          set +e
          registry_output="$(npm view "$package_name@$package_version" dist.integrity --json 2>&1)"
          registry_status=$?
          set -e
          if [ "$registry_status" -eq 0 ]; then
            registry_integrity="$(printf '%s' "$registry_output" | jq -er 'select(type == "string")')"
            if [ "$registry_integrity" != "$local_integrity" ]; then
              echo "$package_name@$package_version already exists with different bytes" >&2
              exit 1
            fi
            echo "$package_name@$package_version already contains the verified tarball; recovering publication"
            exit 0
          fi
          if ! printf '%s' "$registry_output" | grep -q 'E404'; then
            printf '%s\n' "$registry_output" >&2
            exit "$registry_status"
          fi

          set +e
          npm publish "$TARBALL" --ignore-scripts --access public
          publish_status=$?
          set -e
          if [ "$publish_status" -eq 0 ]; then
            exit 0
          fi

          # A concurrent or response-lost publish can fail locally after npm
          # has committed the version. Re-read the immutable registry record
          # and recover only when its integrity is byte-identical.
          set +e
          registry_output="$(npm view "$package_name@$package_version" dist.integrity --json 2>&1)"
          registry_status=$?
          set -e
          if [ "$registry_status" -eq 0 ]; then
            registry_integrity="$(printf '%s' "$registry_output" | jq -er 'select(type == "string")')"
            if [ "$registry_integrity" = "$local_integrity" ]; then
              echo "$package_name@$package_version contains the verified tarball after an ambiguous publish; recovering publication"
              exit 0
            fi
            echo "$package_name@$package_version appeared with different bytes" >&2
          else
            printf '%s\n' "$registry_output" >&2
          fi
          exit "$publish_status"

  publish-mcp:
    name: Publish verified metadata to the MCP Registry
    # Keep registry publication retryable without reattempting immutable npm.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download the verified publication artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-package-${{ github.sha }}
          path: release-artifact

      - name: Verify the tarball and extract registry metadata
        run: |
          test "$(find release-artifact -mindepth 1 -maxdepth 1 -exec printf x \; | wc -c)" -eq 3
          for artifact_file in package.tgz package.sha256 package-manifest.json; do
            test -f "release-artifact/$artifact_file"
            test ! -L "release-artifact/$artifact_file"
          done
          test "$(jq -r '.schemaVersion' release-artifact/package-manifest.json)" = 1
          test "$(jq -r '.filename' release-artifact/package-manifest.json)" = package.tgz
          manifest_sha="$(jq -er '.sha256 | select(type == "string")' release-artifact/package-manifest.json)"
          test "${#manifest_sha}" -eq 64
          case "$manifest_sha" in *[!0-9a-f]*) exit 1;; esac
          printf '%s  package.tgz\n' "$manifest_sha" | cmp --silent - release-artifact/package.sha256
          actual_sha="$(sha256sum release-artifact/package.tgz | cut -d ' ' -f 1)"
          test "$actual_sha" = "$manifest_sha"
          tar --extract --gzip --file release-artifact/package.tgz --to-stdout package/server.json > server.json

      - name: Install MCP Registry publisher
        # The binary shares this job's OIDC permission, so pin both its release
        # and checksum instead of executing a mutable download.
        env:
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          curl --fail --location --silent --show-error \
            --output mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz
          echo "$MCP_PUBLISHER_SHA256  mcp-publisher.tar.gz" | sha256sum --check --strict
          tar --extract --gzip --file mcp-publisher.tar.gz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
