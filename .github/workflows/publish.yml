name: Publish to npm

on:
  release:
    types: [published]

permissions:
  actions: read # verify canonical CI succeeded for the exact release commit
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  platform-smoke:
    name: Release platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
          no-cache: true
      - name: Setup supported Node consumer runtime
        uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Install frozen dependencies
        run: bun install --frozen-lockfile
      - name: Build the distributable
        run: bun run build
      - name: Run registry-derived cross-platform rendering contracts
        run: bun test src/__tests__/render-conformance-plan.test.ts --timeout 120000

  publish:
    needs: platform-smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the golden-drift gate can diff the release commit
          # (it degrades to HEAD-diff logic outside of `push` events).
          fetch-depth: 0

      - name: Setup Bun
        # Pinned to a commit SHA (not the mutable `v2` tag): this workflow mints
        # the OIDC publish token, so a retagged/compromised action must not be
        # able to ride along. SHA is oven-sh/setup-bun v2.2.0.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pin to the runtime ci.yml validates on (see ci.yml note re: `latest`).
          bun-version: 1.3.13
          no-cache: true

      - name: Verify release tag, package versions, and checked-out commit agree
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: bun run scripts/ci/release-identity.ts

      - name: Require successful canonical CI for the exact release commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs="$(gh api -X GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
            -f head_sha="$GITHUB_SHA" \
            -f branch=main \
            -f status=success \
            -f per_page=100)"
          successes="$(printf '%s' "$runs" | jq --arg sha "$GITHUB_SHA" \
            '[.workflow_runs[] | select(.head_sha == $sha and .conclusion == "success")] | length')"
          if [ "$successes" -lt 1 ]; then
            echo "No successful CI workflow run exists for release commit $GITHUB_SHA on main" >&2
            exit 1
          fi

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v7
        with:
          # OIDC trusted publishing requires Node >= 22.14 and npm >= 11.5.1.
          # (Node 20 is also EOL as of 2026-04-30.)
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        # Node 22 bundles npm 10.9.x; trusted publishing needs npm >= 11.5.1.
        # Pin npm instead of using the moving `latest` tag: npm 12.0.0 shipped
        # without the `sigstore` module needed by libnpmpublish's provenance
        # path on GitHub-hosted runners. Install `sigstore` in a temp prefix,
        # then copy that node_modules tree into npm's own module tree so
        # libnpmpublish can resolve it from inside npm without asking npm to
        # install dependencies for npm itself.
        run: |
          npm install -g npm@11.18.0
          tmp_sigstore="$(mktemp -d)"
          npm install --prefix "$tmp_sigstore" sigstore@latest
          cp -R "$tmp_sigstore/node_modules/." "$(npm root -g)/npm/node_modules/"
          npm --version
          NPM_GLOBAL_ROOT="$(npm root -g)" node -e "const { createRequire } = require('module'); console.log(createRequire(process.env.NPM_GLOBAL_ROOT + '/npm/package.json').resolve('sigstore'))"

      - name: Refuse an already-published immutable npm version
        run: |
          version="$(node -p "require('./package.json').version")"
          set +e
          output="$(npm view "agentic-mermaid@$version" version 2>&1)"
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "agentic-mermaid@$version is already published" >&2
            exit 1
          fi
          if ! printf '%s' "$output" | grep -q 'E404'; then
            printf '%s\n' "$output" >&2
            exit "$status"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Reject new high or critical dependency advisories
        run: bun run audit:dependencies

      # --- Release gate: mirror ci.yml's deterministic test and quality jobs so a tagged
      # release cannot publish a commit that would fail CI.
      # Runs before the test step, whose preload overwrites the committed worker
      # inputs this check pins.
      - name: Check the committed website worker inputs are current
        run: bun run website:check

      - name: Check controlled palette evidence and deterministic performance
        run: |
          bun run gallery:palette-rollout:check
          bun run gallery:palette-harmony:check
          bun run benchmark:palette:check

      - name: Run sketch and whole-corpus layout quality gates
        run: |
          bun run sketch:check
          bun run audit:ugly

      - name: Run tests
        # Use the same bounded covered suite as CI; a release must not have a
        # weaker timeout or omit the under-tested-code finder.
        run: bun run test

      - name: Type check
        run: bun run typecheck

      - name: Install Chromium for browser contracts
        run: bunx playwright install chromium --with-deps

      - name: Run canonical browser contracts
        run: bun run test:browser

      - name: Check README hero image is current with the renderer
        run: bun run hero:check

      - name: Golden snapshot drift gate
        run: bun run scripts/ci/golden-drift.ts

      - name: Incremental mutation lane (faithfulness counter)
        run: bun run mutation-test -- incremental

      - name: Prove focused route regressions fail
        run: bun run sabotage:routes

      - name: Fuzz the shipped artifact (built bundle + packed tarball, under Node 22)
        # The strongest pre-publish signal: builds dist/, compiles the standalone
        # binary, and packs+installs the tarball, then drives the library + bins
        # under plain Node. Validates the exact files[]/exports/bin a release
        # commit may have changed.
        run: cd e2e && bun test cli-smoke.e2e.test.ts dist-artifact-fuzz.e2e.test.ts single-binary.e2e.test.ts tarball-consumer-fuzz.e2e.test.ts --timeout 600000

      - name: Setup minimum supported Node.js consumer runtime
        uses: actions/setup-node@v7
        with:
          node-version: '18'

      - name: Pack, install, and fuzz the tarball under Node 18
        run: cd e2e && bun test tarball-consumer-fuzz.e2e.test.ts --timeout 600000

      - name: Restore trusted-publishing Node.js runtime
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify pinned npm publisher survived the runtime switch
        run: test "$(npm --version)" = "11.18.0"

      - name: Build distributable
        run: bun run build

      - name: Publish to npm (OIDC trusted publishing)
        # No NODE_AUTH_TOKEN: auth is via the OIDC id-token minted above, so the
        # trusted publisher must be configured on npmjs.com first (see
        # docs/contributing/releasing.md). Provenance is generated automatically
        # under trusted publishing — no `--provenance` flag needed.
        run: npm publish --access public

  publish-mcp:
    # Keep registry publication in a retryable job. If it fails after npm has
    # accepted an immutable version, rerunning this job must not publish npm again.
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install MCP Registry publisher
        # This binary shares the job's OIDC permission, so pin both the release
        # and checksum instead of executing the mutable latest download.
        env:
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          curl --fail --location --silent --show-error \
            --output mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz
          echo "$MCP_PUBLISHER_SHA256  mcp-publisher.tar.gz" | sha256sum --check --strict
          tar --extract --gzip --file mcp-publisher.tar.gz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
