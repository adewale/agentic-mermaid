name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          # Keep CI on the known-good runtime used for local/release validation.
          # `latest` moved underneath this PR and made coverage runs flaky.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Run tests with coverage
        # Text coverage is enough for CI signal; avoid lcov generation in PR
        # runners because Bun can leave the coverage writer hanging there.
        run: bun test --coverage --coverage-reporter=text src/__tests__/

      - name: Type check
        run: bun x tsc --noEmit

      - name: Check README hero image is current with the renderer
        # Compares a deterministic fingerprint of the renderer output behind
        # assets/hero.png (diagram SVG + ASCII) — no fonts/rasterization needed.
        run: bun run hero:check

      - name: Check for unreviewed snapshot changes
        run: |
          if git diff --name-only | grep -q 'src/__tests__/testdata/'; then
            echo "::warning::Snapshot files in src/__tests__/testdata/ were modified. Please review the golden file changes."
            git diff --stat -- src/__tests__/testdata/
          fi

  e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          # Keep CI on the known-good runtime used for local/release validation.
          # `latest` moved underneath this PR and made coverage runs flaky.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run CLI/security E2E tests
        # Unit tests are the coverage gate; e2e/bunfig.toml disables coverage
        # instrumentation for browser/binary E2E.
        run: cd e2e && bun test cli-smoke.e2e.test.ts cli.e2e.test.ts security-csp.e2e.test.ts --timeout 120000

      - name: Run single-binary E2E tests
        run: cd e2e && bun test single-binary.e2e.test.ts --timeout 180000

      - name: Run browser E2E tests
        run: cd e2e && bun test browser.test.ts --timeout 600000
