name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          # Keep CI on the known-good runtime used for local/release validation.
          # `latest` moved underneath this PR and made coverage runs flaky.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Run tests (coverage = under-tested finder, NOT an adequacy target)
        # The pass/fail of this suite is the gate. Coverage is printed only to
        # locate under-tested files — it is deliberately NOT a quality target:
        # line coverage is weakly correlated with fault detection once suite
        # size is controlled (Inozemtseva & Holmes, ICSE 2014). The real
        # adequacy signal is the mutation score, which runs nightly
        # (nightly-route-mutation.yml) because a full run is too slow to gate
        # every PR. See docs/testing-strategy.md.
        run: bun test --coverage --coverage-reporter=text src/__tests__/

      - name: Adequacy signal reminder
        # Surface where the trustworthy adequacy number lives so a green
        # coverage column is not mistaken for a strong suite.
        run: |
          echo "::notice title=Adequacy signal::Line coverage above is a finder, not a target. The mutation score (nightly-route-mutation.yml) is the adequacy signal — see docs/testing-strategy.md."

      - name: Type check
        run: bun x tsc --noEmit

      - name: Check README hero image is current with the renderer
        # Compares a deterministic fingerprint of the renderer output behind
        # assets/hero.png (diagram SVG + ASCII) — no fonts/rasterization needed.
        run: bun run hero:check

      - name: Golden snapshot drift is a hard gate (reviewed-token required)
        # If running the suite regenerated any committed golden under testdata/,
        # the change must be acknowledged: the diff has to be committed AND the
        # HEAD commit message must carry the reviewed token [approve-goldens].
        # A bare ::warning:: was ignorable (testing-tools learning #2: ignorable
        # signals drift); this fails the build unless a human signed off.
        run: |
          drift="$(git diff --name-only -- src/__tests__/testdata/)"
          if [ -n "$drift" ]; then
            echo "::group::Uncommitted golden drift"
            git diff --stat -- src/__tests__/testdata/
            echo "::endgroup::"
            echo "::error::Running the suite changed committed goldens under src/__tests__/testdata/ that were not committed. Re-generate, review, commit them, and put [approve-goldens] in the commit message."
            exit 1
          fi
          if git log -1 --format=%B | grep -q '\[approve-goldens\]'; then
            if git show --name-only --format= HEAD | grep -q 'src/__tests__/testdata/'; then
              echo "::notice::Golden changes in this commit are explicitly approved via [approve-goldens]."
            else
              echo "::error::[approve-goldens] is present but HEAD changes no goldens under src/__tests__/testdata/. Remove the stray token."
              exit 1
            fi
          elif git show --name-only --format= HEAD | grep -q 'src/__tests__/testdata/'; then
            echo "::error::HEAD modifies committed goldens under src/__tests__/testdata/ without the reviewed token. Add [approve-goldens] to the commit message after reviewing the golden diff."
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          # Keep CI on the known-good runtime used for local/release validation.
          # `latest` moved underneath this PR and made coverage runs flaky.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run CLI/security E2E tests
        # Unit tests are the coverage gate; e2e/bunfig.toml disables coverage
        # instrumentation for browser/binary E2E.
        run: cd e2e && bun test cli-smoke.e2e.test.ts cli.e2e.test.ts security-csp.e2e.test.ts --timeout 120000

      - name: Run single-binary E2E tests
        run: cd e2e && bun test single-binary.e2e.test.ts --timeout 180000

      - name: Run browser E2E tests
        run: cd e2e && bun test browser.test.ts --timeout 600000

  # Fast incremental mutation gate (Move 7). The broad route/ascii mutation
  # lanes stay nightly (too slow to gate every PR); this lane mutates only the
  # small, pure faithfulness counter (src/agent/structural-count.ts) with a
  # sub-second unit-test runner, so a full run is ~1 min and gates per-PR via
  # the config's thresholds.break. It is the adequacy signal that line coverage
  # is not (Inozemtseva & Holmes; Just et al.) — see docs/testing-strategy.md.
  mutation-incremental:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install
      - name: Incremental mutation lane (structural-count core)
        run: bun run mutation-test:incremental
