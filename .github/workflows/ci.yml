name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history (not the default shallow depth-1). On a pull_request the
          # checkout is the merge ref: HEAD is a merge commit whose parents
          # [base, prHead] the golden-drift gate diffs to find the PR's OWN
          # golden changes. Shallow checkout omits those parents, so the gate
          # saw a parentless commit and flagged the whole testdata tree.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          # Keep CI on the known-good runtime used for local/release validation.
          # `latest` moved underneath this PR and made coverage runs flaky.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Must run before the test step: the test preload rebuilds website/public
      # and re-emits website/src/generated, overwriting the committed worker
      # inputs (wasm/harness/fonts/deploy-version) this check pins against
      # source — so drift has to be caught before the rebuild runs.
      - name: Check the committed website worker inputs are current
        run: bun run website:check

      - name: Run tests (coverage = under-tested finder, NOT an adequacy target)
        # The pass/fail of this suite is the gate. Coverage is printed only to
        # locate under-tested files — it is deliberately NOT a quality target:
        # line coverage is weakly correlated with fault detection once suite
        # size is controlled (Inozemtseva & Holmes, ICSE 2014). The real
        # adequacy signal is the mutation score. The nightly broad lane
        # (nightly-route-mutation.yml) currently times out before producing it
        # (every run cancelled at the 90-min cap since 2026-06-19; the sharding
        # fix is PR #63) — regenerate scores locally per docs/mutation-testing.md.
        # Coverage is lcov-only (see bunfig.toml [test].coverageReporter —
        # bunfig overrides any --coverage-reporter CLI flag): the text table
        # intermittently kills bun's stdout writer with `error: An internal
        # error occurred (WriteFailed)`, exiting 1 with zero test failures
        # (runs 28576001032, 28576303182). The pass/fail summary still prints.
        # Coverage makes corpus and adversarial tests several times slower on
        # shared runners. The canonical package script owns their one bounded
        # command-line default so local, CI, and release gates cannot drift.
        run: bun run test

      - name: Adequacy signal reminder
        # Surface where the trustworthy adequacy number lives so a green
        # coverage column is not mistaken for a strong suite.
        run: |
          echo "::notice title=Adequacy signal::Line coverage above is a finder, not a target. The mutation score is the adequacy signal — but the nightly lane currently times out (PR #63 has the sharding fix); regenerate locally per docs/mutation-testing.md."

      - name: Run sketch prototype style checks
        run: bun run sketch:check

      - name: Type check
        run: bun run typecheck

      - name: Check README hero image is current with the renderer
        # Compares a deterministic fingerprint of the renderer output behind
        # assets/hero.png (diagram SVG + ASCII) — no fonts/rasterization needed.
        run: bun run hero:check

      - name: Golden snapshot drift is a hard gate (reviewed-token required)
        # The decision logic lives in scripts/ci/golden-drift.ts and is
        # unit-tested (src/__tests__/golden-drift.test.ts) — a bare ::warning::
        # was ignorable (testing-tools learning #2), and inline bash was
        # untestable (learning: fold gate logic into tested code). The script
        # fails the build unless golden movement is committed AND approved with
        # a commit-message line starting with [approve-goldens].
        run: bun run scripts/ci/golden-drift.ts

  e2e:
    runs-on: ubuntu-latest
    needs: test
    # Raised from 30: the added dist-artifact + tarball-consumer fuzz steps carry
    # large per-test --timeout budgets (400s/600s) whose sum now exceeds 30 min.
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          # Keep CI on the known-good runtime used for local/release validation.
          # `latest` moved underneath this PR and made coverage runs flaky.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run CLI/security E2E tests
        # Unit tests are the coverage gate; e2e/bunfig.toml disables coverage
        # instrumentation for browser/binary E2E.
        run: cd e2e && bun test cli-smoke.e2e.test.ts cli.e2e.test.ts security-csp.e2e.test.ts fresh-checkout.e2e.test.ts --timeout 120000

      - name: Run single-binary E2E tests
        run: cd e2e && bun test single-binary.e2e.test.ts --timeout 180000

      - name: Run dist-artifact differential fuzz (built bundle under plain Node)
        # Builds dist/ and fuzzes the shipped bundle under Node against the
        # source build (crash parity across families + byte-equality on
        # flowcharts). The runner's preinstalled `node` satisfies findNodeBinary.
        run: cd e2e && bun test dist-artifact-fuzz.e2e.test.ts --timeout 400000

      - name: Run tarball-consumer fuzz (npm pack -> install -> drive bins under Node)
        # Packs, installs into a clean project, and fuzzes the installed library
        # + `am`/`agentic-mermaid-mcp` bins as spawned Node processes — the real
        # consumer path (exports resolution, files[], bin linking, native deps).
        run: cd e2e && bun test tarball-consumer-fuzz.e2e.test.ts --timeout 600000

      - name: Run browser E2E tests
        run: cd e2e && bun test browser.test.ts --timeout 600000

      - name: Run browser-gated unit contracts
        # editor-theme-switch.test.ts and website-browser-a11y.test.ts live in
        # src/__tests__ but need a real Chromium, so they describe.skip in the
        # unit job (no browsers there). Run them here where Playwright is
        # installed — otherwise the chrome/artwork behavioral contract and the
        # website accessibility smoke never execute in CI.
        run: bun test src/__tests__/editor-theme-switch.test.ts src/__tests__/website-browser-a11y.test.ts --timeout 120000

  # Fast incremental mutation gate. The broad route lanes stay nightly
  # (too slow to gate every PR); this lane mutates the small, pure faithfulness/
  # ranking core (structural-count.ts + faithfulnessWarning + rankWarnings) with
  # a sub-second unit runner — measured ~96% kill in ~1 min, gated by
  # thresholds.break=90. It is the adequacy signal that line coverage is not
  # (Inozemtseva & Holmes; Just et al.) — see docs/testing-strategy.md.
  #
  # `--since` scopes mutation to files changed in the PR, so when none of the
  # mutate-listed files changed the lane is a fast no-op; when more core files
  # are added to the config's `mutate`, this same job covers them automatically.
  mutation-incremental:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Incremental mutation lane (faithfulness + ranking core)
        # Mutates the small, pure faithfulness/ranking core; gated by the
        # config's thresholds.break. A full run on this lane is ~1 min, so it
        # runs in full every PR (no --since scoping needed for so few files).
        run: npx stryker run stryker.incremental.config.json
