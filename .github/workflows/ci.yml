name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Type check
        run: bun x tsc --noEmit

      - name: Check for unreviewed snapshot changes
        run: |
          if git diff --name-only | grep -q 'src/__tests__/testdata/'; then
            echo "::warning::Snapshot files in src/__tests__/testdata/ were modified. Please review the golden file changes."
            git diff --stat -- src/__tests__/testdata/
          fi

  e2e:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run E2E tests
        run: bun test e2e/ --timeout 600000
