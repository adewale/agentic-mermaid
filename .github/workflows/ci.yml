name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          # Keep CI on the known-good runtime used for local/release validation.
          # `latest` moved underneath this PR and made coverage runs flaky.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build the Node bundle for cross-runtime determinism contracts
        run: bun run build

      - name: Run test shard (coverage = under-tested finder, NOT an adequacy target)
        # The pass/fail of this suite is the gate. Coverage is merged from all
        # three shards only to locate under-tested files — it is deliberately
        # NOT a quality target:
        # line coverage is weakly correlated with fault detection once suite
        # size is controlled (Inozemtseva & Holmes, ICSE 2014). Treat it as one
        # diagnostic alongside the behavioral, property, differential, and
        # fault-injection checks below rather than promoting any single proxy
        # to an overall adequacy score.
        # Coverage is lcov-only (see bunfig.toml [test].coverageReporter —
        # bunfig overrides any --coverage-reporter CLI flag): the text table
        # intermittently kills bun's stdout writer with `error: An internal
        # error occurred (WriteFailed)`, exiting 1 with zero test failures
        # (runs 28576001032, 28576303182). The pass/fail summary still prints.
        # Coverage makes corpus and adversarial tests several times slower on
        # shared runners. The canonical package script owns their one bounded
        # command-line default so local, CI, and release gates cannot drift;
        # CI appends only Bun's deterministic file-shard selector.
        run: bun run test -- --shard=${{ matrix.shard }}

      - name: Upload shard coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-${{ strategy.job-index }}
          path: coverage/lcov.info
          if-no-files-found: warn
          overwrite: true
          retention-days: 7

  quality:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history (not the default shallow depth-1). On a pull_request the
          # checkout is the merge ref: HEAD is a merge commit whose parents
          # [base, prHead] the golden-drift gate diffs to find the PR's OWN
          # golden changes. Shallow checkout omits those parents, so the gate
          # saw a parentless commit and flagged the whole testdata tree.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # This runs in a pristine job before sketch:check invokes bun:test and its
      # preload rebuilds website/public and website/src/generated.
      - name: Check the committed website worker inputs are current
        run: bun run website:check

      - name: Run sketch prototype style checks
        run: bun run sketch:check

      - name: Type check
        run: bun run typecheck

      - name: Check README hero image is current with the renderer
        # Compares a deterministic fingerprint of the renderer output behind
        # assets/hero.png (diagram SVG + ASCII) — no fonts/rasterization needed.
        run: bun run hero:check

      - name: Golden snapshot drift is a hard gate (reviewed-token required)
        # The decision logic lives in scripts/ci/golden-drift.ts and is
        # unit-tested (src/__tests__/golden-drift.test.ts) — a bare ::warning::
        # was ignorable (testing-tools learning #2), and inline bash was
        # untestable (learning: fold gate logic into tested code). The script
        # fails the build unless golden movement is committed AND approved with
        # a commit-message line starting with [approve-goldens].
        run: bun run scripts/ci/golden-drift.ts

  route-sabotage:
    name: Route regression sabotage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prove focused route regressions fail
        # Five one-line fault injections run in detached worktrees. This stays
        # bounded (~1 min) and proves the named regression tests actually bite.
        run: bun run sabotage:routes

  # Preserve the existing required check name while the work behind it runs in
  # parallel. always() turns a failed or cancelled prerequisite into a failed
  # aggregate gate instead of a misleading skipped check.
  test:
    runs-on: ubuntu-latest
    needs: [unit, quality, route-sabotage]
    if: ${{ always() }}

    steps:
      - uses: actions/checkout@v4
        if: ${{ needs.unit.result == 'success' }}

      - name: Setup Bun for coverage merge
        if: ${{ needs.unit.result == 'success' }}
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Download shard coverage
        if: ${{ needs.unit.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          pattern: unit-coverage-*
          path: coverage-shards

      - name: Merge shard coverage
        if: ${{ needs.unit.result == 'success' }}
        run: bun run scripts/ci/merge-lcov.ts coverage-shards coverage/lcov.info 3

      - name: Upload merged coverage
        if: ${{ needs.unit.result == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          overwrite: true
          retention-days: 7

      - name: Require every test lane to pass
        if: ${{ always() }}
        env:
          UNIT_RESULT: ${{ needs.unit.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          SABOTAGE_RESULT: ${{ needs['route-sabotage'].result }}
        run: |
          if [[ "$UNIT_RESULT" != "success" || "$QUALITY_RESULT" != "success" || "$SABOTAGE_RESULT" != "success" ]]; then
            echo "unit=$UNIT_RESULT quality=$QUALITY_RESULT route-sabotage=$SABOTAGE_RESULT"
            exit 1
          fi

  e2e:
    name: E2E (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        suite: [cli, dist-artifact, tarball-consumer, browser]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          # Keep CI on the known-good runtime used for local/release validation.
          # `latest` moved underneath this PR and made coverage runs flaky.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        if: ${{ matrix.suite == 'browser' }}
        run: bunx playwright install chromium --with-deps

      - name: Run CLI E2E tests
        if: ${{ matrix.suite == 'cli' }}
        # Unit tests are the coverage gate; e2e/bunfig.toml disables coverage
        # instrumentation for browser/binary E2E.
        run: cd e2e && bun test cli-smoke.e2e.test.ts cli.e2e.test.ts fresh-checkout.e2e.test.ts --timeout 120000

      - name: Run single-binary E2E tests
        if: ${{ matrix.suite == 'cli' }}
        run: cd e2e && bun test single-binary.e2e.test.ts --timeout 180000

      - name: Run dist-artifact differential fuzz (built bundle under plain Node)
        if: ${{ matrix.suite == 'dist-artifact' }}
        # Builds dist/ and fuzzes the shipped bundle under Node against the
        # source build (crash parity across families + byte-equality on
        # flowcharts). The runner's preinstalled `node` satisfies findNodeBinary.
        run: cd e2e && bun test dist-artifact-fuzz.e2e.test.ts --timeout 400000

      - name: Run tarball-consumer fuzz (npm pack -> install -> drive bins under Node)
        if: ${{ matrix.suite == 'tarball-consumer' }}
        # Packs, installs into a clean project, and fuzzes the installed library
        # + `am`/`agentic-mermaid-mcp` bins as spawned Node processes — the real
        # consumer path (exports resolution, files[], bin linking, native deps).
        run: cd e2e && bun test tarball-consumer-fuzz.e2e.test.ts --timeout 600000

      - name: Run browser security E2E tests
        if: ${{ matrix.suite == 'browser' }}
        run: cd e2e && bun test security-csp.e2e.test.ts --timeout 120000

      - name: Run browser E2E tests
        if: ${{ matrix.suite == 'browser' }}
        run: cd e2e && bun test browser.test.ts --timeout 600000

      - name: Run browser-gated unit contracts
        if: ${{ matrix.suite == 'browser' }}
        # These suites live in src/__tests__ but require the explicit browser
        # opt-in and a real Chromium, so keep them out of the unit shards and
        # execute the complete theme/style/accessibility contract here. Keep
        # one file per Bun process: loading all three files together overlaps
        # their browser/server hooks and exhausts a constrained hosted runner.
        run: |
          cd e2e
          AM_BROWSER_TESTS=1 bun test ../src/__tests__/editor-theme-switch.test.ts --timeout 600000
          AM_BROWSER_TESTS=1 bun test ../src/__tests__/editor-style-switch.test.ts --timeout 600000
          AM_BROWSER_TESTS=1 bun test ../src/__tests__/website-browser-a11y.test.ts --timeout 600000

  # Bounded fault-detection check for a small, pure module. This lane is kept
  # because a full run is about one minute and its measured ~97% kill score is
  # stable; broad scheduled mutation was removed because its recurring runner
  # cost and maintenance exceeded its demonstrated value.
  mutation-incremental:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Incremental mutation lane (faithfulness counter)
        # Mutates the small, pure faithfulness counter; gated by the
        # config's thresholds.break. A full run on this lane is ~1 min, so it
        # runs in full every PR (no --since scoping needed for so few files).
        run: bun run mutation-test:incremental
