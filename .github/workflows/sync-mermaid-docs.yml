name: Verify pinned upstream Mermaid syntax docs

on:
  pull_request:
    paths:
      - ".github/workflows/sync-mermaid-docs.yml"
      - "docs/project/upstream-mermaid-policy.json"
      - "skills/agentic-mermaid-diagram-workflow/references/upstream/**"
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Read the reviewed upstream pin
        id: pin
        run: |
          set -euo pipefail
          commit="$(jq -r '.pin.commit' docs/project/upstream-mermaid-policy.json)"
          test -n "$commit"
          test "$commit" != "null"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
      - name: Checkout upstream Mermaid docs
        uses: actions/checkout@v7
        with:
          repository: mermaid-js/mermaid
          ref: ${{ steps.pin.outputs.commit }}
          path: mermaid-upstream
          sparse-checkout: |
            docs/syntax
          sparse-checkout-cone-mode: true
      - name: Verify reviewed references match the pin
        run: |
          set -euo pipefail
          actual="$(git -C mermaid-upstream rev-parse HEAD)"
          test "$actual" = "${{ steps.pin.outputs.commit }}"

          expected="skills/agentic-mermaid-diagram-workflow/references/upstream"
          harvested="$(mktemp -d)"
          find mermaid-upstream/docs/syntax -maxdepth 1 -type f -name '*.md' -exec cp {} "$harvested/" \;
          diff -ru "$expected" "$harvested"

          echo "Pinned syntax references are current at $actual"
          echo "Upgrades must update the policy, references, generated manifest/index/report, and receipts together in a reviewed PR."
