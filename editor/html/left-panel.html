<section class="panel-left" id="panel-left" aria-label="Source editor and diagram settings">
  <!-- Code editor view -->
  <div class="editor-wrap" id="editor-view" role="region" aria-label="Source editor" aria-hidden="false">
    <div class="line-numbers" id="line-numbers">1</div>
    <label class="sr-only" for="code-editor">Mermaid source</label>
    <textarea
      class="code-editor"
      id="code-editor"
      spellcheck="false"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      aria-label="Mermaid source"
      placeholder="Enter Mermaid diagram syntax here…"
    ></textarea>
  </div>

  <!-- Config view -->
  <div class="config-panel" id="config-view" role="region" aria-label="Style settings" hidden aria-hidden="true">
    <!-- Colors section -->
    <div class="config-section">
      <div class="config-section-title">Colors</div>
      <div class="color-field">
        <span class="color-field-label">Background</span>
        <button class="color-edit-btn" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="color-popup" data-cfg="bg" aria-label="Edit background color">
          <span class="cfg-hex-label" id="cfg-bg-label">–</span>
          <span class="color-swatch" id="cfg-bg-swatch"></span>
        </button>
      </div>
      <div class="color-field">
        <span class="color-field-label">Foreground</span>
        <button class="color-edit-btn" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="color-popup" data-cfg="fg" aria-label="Edit foreground color">
          <span class="cfg-hex-label" id="cfg-fg-label">–</span>
          <span class="color-swatch" id="cfg-fg-swatch"></span>
        </button>
      </div>
      <div class="color-field">
        <span class="color-field-label">Accent</span>
        <button class="color-edit-btn" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="color-popup" data-cfg="accent" aria-label="Edit accent color">
          <span class="cfg-hex-label" id="cfg-accent-label">–</span>
          <span class="color-swatch" id="cfg-accent-swatch"></span>
        </button>
      </div>
      <div class="color-field">
        <span class="color-field-label">Line</span>
        <button class="color-edit-btn" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="color-popup" data-cfg="line" aria-label="Edit line color">
          <span class="cfg-hex-label" id="cfg-line-label">–</span>
          <span class="color-swatch" id="cfg-line-swatch"></span>
        </button>
      </div>
      <div class="color-field">
        <span class="color-field-label">Muted</span>
        <button class="color-edit-btn" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="color-popup" data-cfg="muted" aria-label="Edit muted text color">
          <span class="cfg-hex-label" id="cfg-muted-label">–</span>
          <span class="color-swatch" id="cfg-muted-swatch"></span>
        </button>
      </div>
      <div class="color-field">
        <span class="color-field-label">Surface</span>
        <button class="color-edit-btn" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="color-popup" data-cfg="surface" aria-label="Edit surface color">
          <span class="cfg-hex-label" id="cfg-surface-label">–</span>
          <span class="color-swatch" id="cfg-surface-swatch"></span>
        </button>
      </div>
    </div>

    <!-- Font section -->
    <div class="config-section">
      <div class="config-section-title">Typography</div>
      <div class="font-field">
        <span class="font-field-label">Font family</span>
        <button class="font-select-btn" id="font-select-btn" type="button" aria-label="Choose diagram font family" aria-haspopup="listbox" aria-expanded="false" aria-controls="font-popup">
          <span id="font-select-label">Default</span>
          <span class="font-select-caret">▼</span>
        </button>
      </div>
    </div>

    <!-- Layout section -->
    <div class="config-section">
      <div class="config-section-title">Layout</div>
      <div class="padding-field">
        <div class="padding-row">
          <label for="cfg-padding">Padding</label>
          <input
            class="padding-num"
            id="cfg-padding"
            type="number"
            min="0"
            max="120"
            value="24"
          />
        </div>
        <input
          class="padding-slider"
          id="cfg-padding-slider"
          type="range"
          aria-label="Padding"
          min="0"
          max="120"
          value="24"
        />
      </div>
      <div class="padding-field">
        <div class="padding-row">
          <label for="cfg-edge-stroke">Edge stroke</label>
          <input
            class="padding-num"
            id="cfg-edge-stroke"
            type="number"
            min="0.25"
            max="6"
            step="0.25"
            value="1"
          />
        </div>
        <input
          class="padding-slider"
          id="cfg-edge-stroke-slider"
          type="range"
          aria-label="Edge stroke"
          min="0.25"
          max="6"
          step="0.25"
          value="1"
        />
      </div>
      <div class="padding-field">
        <div class="padding-row">
          <label for="cfg-node-stroke">Node border</label>
          <input
            class="padding-num"
            id="cfg-node-stroke"
            type="number"
            min="0.25"
            max="6"
            step="0.25"
            value="1"
          />
        </div>
        <input
          class="padding-slider"
          id="cfg-node-stroke-slider"
          type="range"
          aria-label="Node border"
          min="0.25"
          max="6"
          step="0.25"
          value="1"
        />
      </div>
    </div>

    <div class="config-footer">
      <button class="config-reset-btn" id="config-reset-btn" type="button">Reset to theme</button>
    </div>
  </div>

  <!-- Color picker popup (shared) -->
  <div class="color-popup" id="color-popup" role="dialog" aria-modal="false" aria-labelledby="color-popup-title" aria-hidden="true" inert>
    <div class="color-popup-header">
      <span class="color-popup-title" id="color-popup-title">Color</span>
      <button class="color-popup-close" id="color-popup-close" type="button" aria-label="Close color picker">×</button>
    </div>
    <div class="color-hex-row">
      <label class="sr-only" for="color-native-input">Native color picker</label>
      <input type="color" class="color-native" id="color-native-input" />
      <label class="sr-only" for="color-hex-input">Hex color value</label>
      <input
        type="text"
        class="color-hex-input"
        id="color-hex-input"
        placeholder="#rrggbb"
        maxlength="9"
      />
      <button class="color-clear-btn" id="color-clear-btn" type="button">Clear</button>
    </div>
    <div class="color-palette-title">Presets</div>
    <div class="color-palette" id="color-palette"></div>
  </div>

  <!-- Font picker popup -->
  <div class="font-popup" id="font-popup" aria-hidden="true" inert>
    <div class="font-search-wrap">
      <svg
        class="font-search-icon"
        width="13"
        height="13"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <label class="sr-only" for="font-search">Search fonts</label>
      <input class="font-search" id="font-search" placeholder="Quick search" />
    </div>
    <div class="font-list" id="font-list" role="listbox" aria-label="Font choices"></div>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>
    <div class="status-right">
      <span id="cursor-pos">Ln 1, Col 1</span>
    </div>
  </div>

</section>
