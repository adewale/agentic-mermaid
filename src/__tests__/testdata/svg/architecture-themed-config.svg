<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 739.848 231" width="739.848" height="231" style="--bg:#0b1120;--fg:#1f2937;--line:#f59e0b;--accent:#38bdf8;--muted:#6b7280;--surface:#38bdf8;--border:#7dd3fc;background:var(--bg);--arch-group-fill:#111827;--arch-group-stroke:#38bdf8;--arch-service-fill:#0f172a;--arch-service-stroke:#7dd3fc">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM%20Plex%20Sans:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'IBM Plex Sans', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<style>
  .architecture-group-frame { fill: var(--arch-group-fill, color-mix(in srgb, var(--_node-fill) 82%, var(--bg))); stroke: none; }
  .architecture-group-band { fill: color-mix(in srgb, var(--_arrow) 5%, var(--arch-group-fill, var(--bg))); stroke: none; }
  .architecture-group-outline { fill: none; stroke: var(--arch-group-stroke, var(--_node-stroke)); stroke-width: 1; }
  .architecture-group-label { fill: var(--_text-sec); }
  .architecture-service-card { fill: var(--arch-service-fill, color-mix(in srgb, var(--_node-fill) 92%, var(--bg))); stroke: none; }
  .architecture-service-outline { fill: none; stroke: var(--arch-service-stroke, var(--_node-stroke)); stroke-width: 1; }
  .architecture-service-label { fill: var(--_text); }
  .architecture-edge { fill: none; stroke: var(--_line); stroke-width: 1; stroke-linejoin: round; }
  .architecture-edge-label-bg { fill: color-mix(in srgb, var(--bg) 90%, var(--_group-hdr)); stroke: color-mix(in srgb, var(--_line) 18%, var(--bg)); stroke-width: 0.75; }
  .architecture-edge-label-text { fill: var(--_text-muted); }
  .architecture-junction-ring { fill: var(--bg); stroke: var(--_arrow); stroke-width: 1.25; }
  .architecture-junction-core { fill: color-mix(in srgb, var(--_arrow) 24%, var(--bg)); stroke: var(--_arrow); stroke-width: 0.75; }
  .architecture-icon-mark { fill: none; stroke: var(--_arrow); stroke-width: 1.25; stroke-linecap: round; stroke-linejoin: round; }
  .architecture-icon-glyph { fill: var(--_arrow); }
</style>
<defs>
  <marker id="architecture-arrow-end" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="architecture-arrow-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<g class="architecture-group" data-id="edge" data-label="Edge
Layer">
  <rect class="architecture-group-frame" x="60" y="60" width="228.784" height="111" rx="0" ry="0" />
  <path class="architecture-group-band" d="M60,60 H288.784 V95 H60 Z" />
  <rect class="architecture-group-outline" x="60" y="60" width="228.784" height="111" rx="0" ry="0" />
  <g class="architecture-icon" data-icon="cloud">
  <circle class="architecture-icon-mark" cx="77.6912" cy="77.9232" r="3.3856" />
<circle class="architecture-icon-mark" cx="81.9232" cy="75.8072" r="4.232" />
<circle class="architecture-icon-mark" cx="85.732" cy="77.9232" r="3.174" />
<path class="architecture-icon-mark" d="M 74.3056 80.8856 H 88.4828" />
</g>
  <text x="96" y="77.5" class="architecture-group-label" text-anchor="start" font-size="15" font-weight="600"><tspan x="96" dy="-4.5">Edge</tspan><tspan x="96" dy="19.5">Layer</tspan></text>
</g>
<polyline class="architecture-edge" data-from="api" data-to="db" data-from-side="R" data-to-side="L" data-from-boundary="item" data-to-boundary="item" data-label="reads &lt;records&gt;" points="272.784,131 520.4559999999999,131" marker-end="url(#architecture-arrow-end)" />
<rect x="336.78399999999993" y="114.9" width="119.672" height="32.2" class="architecture-edge-label-bg" rx="0" ry="0" />
<text x="396.61999999999995" y="131" class="architecture-edge-label-text" text-anchor="middle" font-size="14" font-weight="400" dy="4.8999999999999995">reads &lt;records&gt;</text>
<g class="architecture-service" data-id="db" data-label="Primary DB">
  <rect class="architecture-service-card" x="520.4559999999999" y="107" width="159.392" height="48" rx="0" ry="0" />
  <rect class="architecture-service-outline" x="520.4559999999999" y="107" width="159.392" height="48" rx="0" ry="0" />
  <g class="architecture-icon" data-icon="database">
  <ellipse class="architecture-icon-mark" cx="553.4559999999999" cy="126.84" rx="6.24" ry="2.6" />
<path class="architecture-icon-mark" d="M 547.2159999999999 126.84 V 136.2" />
<path class="architecture-icon-mark" d="M 559.6959999999999 126.84 V 136.2" />
<ellipse class="architecture-icon-mark" cx="553.4559999999999" cy="131.52" rx="6.24" ry="2.6" />
<ellipse class="architecture-icon-mark" cx="553.4559999999999" cy="136.2" rx="6.24" ry="2.6" />
</g>
  <text x="580.4559999999999" y="131" class="architecture-service-label" text-anchor="start" font-size="16" font-weight="500" dy="5.6">Primary DB</text>
</g>
<g class="architecture-service" data-id="api" data-label="API &amp; &lt;Gateway&gt;">
  <rect class="architecture-service-card" x="76" y="107" width="196.784" height="48" rx="0" ry="0" />
  <rect class="architecture-service-outline" x="76" y="107" width="196.784" height="48" rx="0" ry="0" />
  <g class="architecture-icon" data-icon="server">
  <rect class="architecture-icon-mark" x="103.28" y="124.76" width="11.44" height="12.48" rx="0" ry="0" />
<path class="architecture-icon-mark" d="M 104.84 128.92 H 113.16" />
<path class="architecture-icon-mark" d="M 104.84 132.56 H 113.16" />
</g>
  <text x="136" y="131" class="architecture-service-label" text-anchor="start" font-size="16" font-weight="500" dy="5.6">API &amp; &lt;Gateway&gt;</text>
</g>
</svg>
